name: Build APK and AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LabourCalculator
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/FarmerBook.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FarmerBook-APK
          path: LabourCalculator/app/build/outputs/apk/debug/FarmerBook.apk

      - name: Decode release keystore
        if: ${{ env.KS != '' }}
        env:
          KS: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KS" | base64 -d > release.keystore

      - name: Build signed release AAB
        if: ${{ env.KS != '' }}
        env:
          KS: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/LabourCalculator/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: gradle bundleRelease --no-daemon

      - name: Upload release AAB
        if: ${{ env.KS != '' }}
        env:
          KS: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: FarmerBook-PlayStore-AAB
          path: LabourCalculator/app/build/outputs/bundle/release/app-release.aab
